name: Flutter BLoC Expert Config
version: 1.0.0
schema: v1

models:
  - name: "Qwen2.5-Coder 7B (Main)"
    provider: ollama
    model: "qwen2.5-coder:7b"
    apiBase: "http://192.168.9.113:11434"
    systemCommand: >
      Bạn là chuyên gia lập trình Flutter với kiến trúc BLoC.
      Khi viết code, hãy tuân thủ chia tách logic rõ ràng giữa Event, State và Bloc.
      '.

# Cấu hình Embedding để kích hoạt @Codebase
embeddingsProvider:
  provider: ollama
  model: "nomic-embed-text:latest" # Đã sửa theo đúng tên trong ollama list của bạn
  apiBase: "http://192.168.9.113:11434"

# Model nhẹ để gợi ý code tự động
tabAutocompleteModel:
  name: "Autocomplete (Fast)"
  provider: ollama
  model: "qwen2.5-coder:1.5b" # Đã khớp với bản 1.5b bạn đang có
  apiBase: "http://192.168.9.113:11434"

contextProviders:
  - name: "codebase"
    params:
      nRetrieve: 25
      nFinal: 5
  - name: "code"
  - name: "terminal"
  - name: "diff"

slashCommands:
  - name: "explain"
    description: "Giải thích đoạn code này"
  - name: "fix"
    description: "Sửa lỗi trong đoạn code được chọn"
  - name: "test"
    description: "Viết Unit Test cho BLoC này"
